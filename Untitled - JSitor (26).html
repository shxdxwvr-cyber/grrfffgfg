<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Math Stealth Hub</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
}

/* Layout */
.container {
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #111;
    padding: 20px;
    border-right: 1px solid #222;
}

.sidebar h1 {
    font-size: 18px;
    text-align: center;
    margin-bottom: 20px;
}

/* Main */
.main {
    flex: 1;
    padding: 20px;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
}

/* Game Card */
.card {
    background: #151515;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
    border: 1px solid #222;
}

.card:hover {
    transform: scale(1.05);
    background: #00f7ff;
    color: black;
    box-shadow: 0 0 15px #00f7ff;
}
</style>
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h1>🕶️ Link Hub</h1>
        <h4>By Math Time</h4>
        <p style="font-size:12px;color:#888;">All games open in about:blank</p>
    </div>

    <!-- Main -->
    <div class="main">
        <h2>Games</h2>

        <div class="grid">

            <!-- GAMES -->
            <div class="card" onclick="openGame('https://duckmath.org')">
                Duck Math
            </div>

            <div class="card" onclick="openGame('https://krunker.io')">
                Krunker
            </div>

            <div class="card" onclick="openGame('https://lovethetrees.org/')">
                Skip
            </div>

            <div class="card" onclick="openGame('https://gn-math.dev')">
                GN Math
            </div>

            <div class="card" onclick="openGame('https://www.coolmathgames.com/')">
                Cool Math
            </div>
                        <div class="card" onclick="openGame('https://gameshtml5.xyz/')">
                Games HTML5
            </div>
                                    <div class="card" onclick="openGame('https://math-games-4u.com/')">
                Gaming Wrld
            </div>
                                              <div class="card" onclick="openGame('https://voidnet.gg/')">
                void network
            </div>
                                                <div class="card" onclick="openGame('https://arsenic.smartfoloo.space/')">
                Arsenic
            </div>
                                                <div class="card" onclick="openGame('https://vault.global.ssl.fastly.net/home/')">
                Vault v6
            </div>
                                                <div class="card" onclick="openGame('https://pizzaedition.win/')">
                Pizza Edition
            </div>
                                                           <div class="card" onclick="openGame('https://lunarsync.smartfoloo.space/')">
                Luner sync
            </div>                                               <div class="card" onclick="openGame('https://selenite.cc/')">
                selenite

                Blocking extenion viewer

                                                                                      <div class="card" onclick="openGame('https://d11jzht7mj96rr.cloudfront.net/')">

            </div>

            <!-- ADD MORE BELOW -->
            <!--
            <div class="card" onclick="openGame('https://your-link.com')">
                Game Name
            </div>
            -->

        </div>
    </div>

</div>

<script>
function openGame(url) {
    const tab = window.open("about:blank", "_blank");

    tab.document.write(`
        <html>
        <head>
            <title>Loading...</title>
            <style>
                body { margin: 0; background: black; }
                iframe {
                    border: none;
                    width: 100vw;
                    height: 100vh;
                }
            </style>
        </head>
        <body>
            <iframe src="${url}" allowfullscreen></iframe>
        </body>
        </html>
    `);
}
</script>

</body>
</html>
