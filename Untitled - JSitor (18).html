<!doctype html><html><head></head><body><!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Cooked</title>

	<style>
		body {
			margin: 0;
			font-family: Arial;
			background: #0a0a0a;
			color: white;
		}

		header {
			display: flex;
			align-items: center;
			padding: 8px;
			background: #111;
			box-shadow: 0 0 15px red;
		}

		h1 {
			color: red;
			margin-right: 10px;
		}

		input {
			flex: 1;
			padding: 6px;
			background: black;
			border: 1px solid red;
			color: white;
		}

		button {
			margin-left: 5px;
			background: black;
			border: 1px solid red;
			color: red;
			cursor: pointer;
		}

		#tabs {
			display: flex;
			background: #111;
			padding: 5px;
			overflow-x: auto;
		}

		.tab {
			padding: 5px 10px;
			margin-right: 5px;
			border: 1px solid red;
			cursor: pointer;
		}

		.active {
			background: red;
			color: black;
		}

		iframe {
			width: 100%;
			height: calc(100vh - 120px);
			border: none;
		}

		#bookmarks {
			background: #111;
			padding: 5px;
			display: flex;
			overflow-x: auto;
		}

		.bookmark {
			margin-right: 5px;
			cursor: pointer;
			border: 1px solid red;
			padding: 3px 6px;
		}

		#clock {
			margin-left: 10px;
		}
	</style>
</head>

<body>

	<header>
		<h1>Cooked</h1>
		<input id="urlInput" placeholder="Enter URL (Cooked By Math Time)">
		<button onclick="go()">Go</button>
		<button onclick="newTab()">＋</button>
		<button onclick="addBookmark()">★</button>
		<button onclick="refreshTab()">⟳</button>
		<button onclick="cloakTab()">🕶</button>
		<select onchange="setTheme(this.value)">
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
    </select>
		<div id="clock"></div>
	</header>

	<div id="tabs"></div>
	<div id="bookmarks"></div>

	<iframe id="frame"></iframe>

	<script>
		let tabs = [];
let currentTab = 0;

// CLOCK
setInterval(()=>{
    document.getElementById("clock").textContent =
        new Date().toLocaleTimeString();
},1000);

// NEW TAB
function newTab(url="about:blank") {
    tabs.push({url, title: "New Tab"});
    currentTab = tabs.length - 1;
    renderTabs();
    loadTab();
}

// SWITCH TAB
function switchTab(i){
    currentTab = i;
    loadTab();
    renderTabs();
}

// LOAD TAB
function loadTab(){
    let frame = document.getElementById("frame");
    let url = tabs[currentTab].url;
    frame.src = "about:blank";
    setTimeout(()=> frame.src = url, 100);
}

// GO TO URL
function go(){
    let url = document.getElementById("urlInput").value;
    if(!url.startsWith("http")) url = "https://" + url;
    tabs[currentTab].url = url;
    loadTab();

    // save history
    localStorage.setItem("last", url);
}

// REFRESH
function refreshTab(){
    loadTab();
}

// CLOSE TAB
function closeTab(i){
    tabs.splice(i,1);
    currentTab = 0;
    renderTabs();
    loadTab();
}

// RENDER TABS
function renderTabs(){
    let container = document.getElementById("tabs");
    container.innerHTML = "";
    tabs.forEach((t,i)=>{
        let el = document.createElement("div");
        el.className = "tab" + (i===currentTab?" active":"");
        el.textContent = t.title;
        el.onclick = ()=>switchTab(i);
        el.ondblclick = ()=>closeTab(i);
        container.appendChild(el);
    });
}

// BOOKMARKS
function addBookmark(){
    let url = tabs[currentTab].url;
    let bookmarks = JSON.parse(localStorage.getItem("bm")||"[]");
    bookmarks.push(url);
    localStorage.setItem("bm", JSON.stringify(bookmarks));
    renderBookmarks();
}

function renderBookmarks(){
    let container = document.getElementById("bookmarks");
    container.innerHTML = "";
    let bookmarks = JSON.parse(localStorage.getItem("bm")||"[]");

    bookmarks.forEach(url=>{
        let el = document.createElement("div");
        el.className = "bookmark";
        el.textContent = url;
        el.onclick = ()=>{
            tabs[currentTab].url = url;
            loadTab();
        };
        container.appendChild(el);
    });
}

// TAB CLOAK
function cloakTab(){
    let name = prompt("Enter fake tab name:");
    if(name) document.title = name;
}

// THEMES
function setTheme(color){
    document.querySelectorAll("*").forEach(el=>{
        el.style.boxShadow = "0 0 10px " + color;
        el.style.borderColor = color;
    });
}

// ENTER KEY
document.getElementById("urlInput")
.addEventListener("keypress", e=>{
    if(e.key==="Enter") go();
});

// INIT
newTab(localStorage.getItem("last") || "https://example.com");
renderBookmarks();
	</script>

</body>

</html></body><html>
