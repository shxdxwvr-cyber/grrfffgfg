<!doctype html><html><head></head><body><!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Frozone</title>
	<style>
		body {
			margin: 0;
			font-family: Arial, sans-serif;
			background: #0a0f1f;
			color: #cce6ff;
			text-align: center;
		}

		h1 {
			margin-top: 20px;
			color: #66ccff;
			text-shadow: 0 0 10px #00aaff, 0 0 20px #0088ff;
		}

		.box {
			margin: 30px auto;
			padding: 20px;
			width: 400px;
			border-radius: 12px;
			background: rgba(0, 50, 100, 0.2);
			box-shadow: 0 0 15px #00aaff;
		}

		input {
			width: 80%;
			padding: 10px;
			border-radius: 8px;
			border: none;
			outline: none;
			margin-bottom: 10px;
			background: #001a33;
			color: white;
			box-shadow: 0 0 10px #0077ff inset;
		}

		button {
			padding: 10px 20px;
			border: none;
			border-radius: 8px;
			background: #0077ff;
			color: white;
			cursor: pointer;
			box-shadow: 0 0 10px #00aaff;
			transition: 0.2s;
		}

		button:hover {
			background: #00aaff;
			box-shadow: 0 0 20px #00ccff;
		}

		#clock {
			margin-top: 10px;
			font-size: 18px;
			text-shadow: 0 0 10px #00aaff;
		}

		.settings {
			margin-top: 20px;
			font-size: 14px;
			opacity: 0.8;
		}
	</style>
</head>

<body>

	<h1>❄️ Frozone By Math Time</h1>

	<div class="box">
		<input id="urlInput" placeholder="Enter URL (example.com)">
		<br>
		<button onclick="openProxy()">Launch</button>

		<div id="clock"></div>

		<div class="settings">
			<label>
            <input type="checkbox" id="httpsToggle" checked>
            Force HTTPS
        </label>
		</div>
	</div>

	<script>
		function formatUrl(url) {
    if (!url.startsWith("http://") && !url.startsWith("https://")) {
        const https = document.getElementById("httpsToggle").checked;
        url = (https ? "https://" : "http://") + url;
    }
    return url;
}

function openProxy() {
    let url = document.getElementById("urlInput").value.trim();
    if (!url) return alert("Enter a URL");

    url = formatUrl(url);

    const newTab = window.open("about:blank", "_blank");

    const html = `
        <html>
        <head>
            <title>Frozone</title>
            <style>
                body {
                    margin:0;
                    background:black;
                }
                iframe {
                    border:none;
                    width:100vw;
                    height:100vh;
                }
            </style>
        </head>
        <body>
            <iframe src="${url}"></iframe>
        </body>
        </html>
    `;

    newTab.document.write(html);
    newTab.document.close();
}

// Clock
function updateClock() {
    const now = new Date();
    document.getElementById("clock").innerText =
        now.toLocaleTimeString();
}

setInterval(updateClock, 1000);
updateClock();
	</script>

</body>

</html></body><html>
