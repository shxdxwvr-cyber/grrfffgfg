<!doctype html>
<html>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Game Menu</title>

<style>
	html,
	body {
		height: 100%;
		margin: 0;
		background: linear-gradient(160deg, #050505, #111, #050505);
		color: white;
		font-family: Arial;
		display: flex;
		justify-content: center;
		align-items: center;
	}

	/* Launcher panel */

	.launcher {
		background: rgba(0, 0, 0, 0.9);
		padding: 40px;
		border-radius: 18px;
		box-shadow: 0 0 40px rgba(0, 0, 0, 0.9);
		text-align: center;
		width: 360px;
		backdrop-filter: blur(6px);
		border: 1px solid #000000ff;
	}

	/* Title */

	h1 {
		margin-top: 0;
		font-size: 28px;
		letter-spacing: 1px;
		text-shadow: 0 0 12px #4da6ff;
	}

	/* Subtitle */

	.subtitle {
		font-size: 13px;
		color: #aaa;
		margin-bottom: 18px;
	}

	/* Support */

	.support {
		margin-bottom: 20px;
		font-size: 14px;
	}

	.phone a {
		color: #4da6ff;
		font-size: 17px;
		text-decoration: none;
	}

	.phone a:hover {
		text-decoration: underline;
	}

	/* Buttons */

	button {
		width: 100%;
		padding: 15px;
		margin: 7px 0;
		font-size: 18px;
		cursor: pointer;
		border: none;
		border-radius: 10px;
		background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
		color: white;
		transition: all 0.2s ease;
		box-shadow: 0 0 8px rgba(0, 0, 0, 0.6);
	}

	button:hover {
		background: #4da6ff;
		color: black;
		transform: scale(1.05);
		box-shadow: 0 0 15px #4da6ff;
	}

	/* Fullscreen button */

	.fullscreen {
		margin-top: 12px;
		background: #333;
	}

	.fullscreen:hover {
		background: #888;
		color: black;
	}

	/* Game iframe */

	iframe {
		position: fixed;
		inset: 0;
		border: 0;
		width: 100%;
		height: 100%;
	}
</style>

<body>

	<div class="launcher">

		<h1>gaming wrld</h1>

		<div class="subtitle">(made by a 6th grader)</div>

		<div class="support">
			<div>email me for support</div>
			<div class="phone">
				<a href="mailto:wywy18707@gmail.com">wywy18707@gmail.com</a>
			</div>
		</div>

		<button onclick="playSkip()">Skip</button>
		<button onclick="playMath()">GN-Math</button>
		<button onclick="playCoolMath()">Cool Math Games</button>
		<button class="fullscreen" onclick="toggleFullscreen()">Toggle Fullscreen</button>

	</div>

	<script>
		function openGame(url){
document.body.innerHTML = `
<iframe
src="${url}"
allow="fullscreen *; gamepad *; pointer-lock *"
allowfullscreen
loading="eager">
</iframe>`;
}

function playSkip(){
openGame("https://skip.nightly.pw");
}

function playMath(){
openGame("https://gnmath.global.ssl.fastly.net/");
}

function playCoolMath(){
openGame("https://www.coolmathgames.com/");
}


function toggleFullscreen(){
if(!document.fullscreenElement){
document.documentElement.requestFullscreen();
}else{
document.exitFullscreen();
}
}

	</script>

</body>

</html></body><html>
