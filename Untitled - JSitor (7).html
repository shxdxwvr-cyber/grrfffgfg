<!doctype html><html><head></head><body><!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Dev Tools</title>

	<style>
		body {
			margin: 0;
			font-family: Arial, sans-serif;
			background: #000;
			color: #0ff;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
		}

		.container {
			width: 80%;
			max-width: 900px;
			text-align: center;
		}

		h1 {
			text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
		}

		input {
			width: 80%;
			padding: 10px;
			margin: 10px;
			background: #111;
			border: 1px solid #0ff;
			color: #0ff;
			box-shadow: 0 0 10px #0ff;
		}

		button {
			padding: 10px 15px;
			margin: 5px;
			background: black;
			border: 1px solid #0ff;
			color: #0ff;
			cursor: pointer;
			box-shadow: 0 0 10px #0ff;
		}

		button:hover {
			background: #0ff;
			color: black;
			box-shadow: 0 0 20px #0ff;
		}

		textarea {
			width: 100%;
			height: 300px;
			margin-top: 15px;
			background: #111;
			border: 1px solid #0ff;
			color: #0ff;
			padding: 10px;
			box-shadow: 0 0 10px #0ff;
		}
	</style>
</head>

<body>

	<div class="container">
		<h1>Dev Tools By Math Time</h1>

		<input id="urlInput" placeholder="Paste your link here...">

		<br>

		<button onclick="getCode()">Get Code</button>
		<button onclick="copyCode()">Copy</button>
		<button onclick="downloadCode()">Download</button>

		<textarea id="output" placeholder="HTML/CSS/JS will appear here..."></textarea>
	</div>

	<script>
		// 🚫 Blocked links
const blockedLinks = [
  "https://mathtimeorgfree.w3spaces.com/",
  "https://mathtimeorg.w3spaces.com/",
  "https://mathtimeorgfunmath.w3spaces.com/"
];

async function getCode() {
  const url = document.getElementById("urlInput").value.trim();
  const output = document.getElementById("output");

  // Block check
  if (blockedLinks.includes(url)) {
    output.value = "🚫 Blocked Link";
    return;
  }

  try {
    const res = await fetch(url);
    const text = await res.text();
    output.value = text;
  } catch (err) {
    output.value = "⚠️ Could not fetch code (blocked by CORS or site security)";
  }
}

function copyCode() {
  const text = document.getElementById("output");
  text.select();
  document.execCommand("copy");
  alert("Copied!");
}

function downloadCode() {
  const code = document.getElementById("output").value;

  if (code.includes("Blocked Link")) {
    alert("Blocked link cannot be downloaded!");
    return;
  }

  const blob = new Blob([code], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "source.html";
  a.click();
}
	</script>

</body>

</html></body><html>
