<!doctype html><html><head></head><body><!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Inferno</title>
	<style>
		body {
			margin: 0;
			font-family: Arial;
			background: black;
			color: white;
			overflow: hidden;
		}

		.glow {
			color: #ff3c00;
			text-shadow: 0 0 10px #ff3c00, 0 0 20px #ff0000;
		}

		header {
			text-align: center;
			padding: 20px;
			font-size: 40px;
		}

		.container {
			display: flex;
			height: calc(100vh - 80px);
		}

		.sidebar {
			width: 200px;
			background: #111;
			padding: 10px;
			box-shadow: 0 0 20px red;
		}

		.sidebar button {
			width: 100%;
			margin: 5px 0;
			padding: 10px;
			background: black;
			color: red;
			border: 1px solid red;
			cursor: pointer;
		}

		.main {
			flex: 1;
			padding: 20px;
			position: relative;
		}

		.panel {
			display: none;
		}

		.active {
			display: block;
		}

		iframe {
			width: 100%;
			height: 400px;
			border: 1px solid red;
		}

		/* Fullscreen */
		.fullscreen {
			position: fixed !important;
			top: 0;
			left: 0;
			width: 100vw !important;
			height: 100vh !important;
			z-index: 9999;
			background: black;
		}

		/* Exit button */
		#exitBtn {
			position: fixed;
			top: 10px;
			right: 10px;
			background: red;
			color: black;
			border: none;
			padding: 10px;
			cursor: pointer;
			display: none;
		}

		/* Loading bar */
		#loading {
			height: 5px;
			width: 0%;
			background: red;
			transition: width 0.3s;
		}

		/* Bookmarks */
		.bookmark {
			cursor: pointer;
			color: orange;
		}
	</style>
</head>

<body>

	<header class="glow">🔥 INFERNO 🔥</header>
	<button id="exitBtn" onclick="exitFullscreen()">Exit</button>
	<div id="loading"></div>

	<div class="container">

		<div class="sidebar">
			<button onclick="show('home')">Home</button>
			<button onclick="show('tools')">Browser</button>
			<button onclick="show('fun')">Fun</button>
			<button onclick="show('settings')">Settings</button>
		</div>

		<div class="main">

			<!-- HOME -->
			<div id="home" class="panel active">
				<h2 class="glow">Welcome to Inferno By Math Time</h2>
			</div>

			<!-- TOOLS -->
			<div id="tools" class="panel">
				<h2 class="glow">Browser</h2>

				<input id="urlBox" placeholder="Enter URL">
				<button onclick="openSite()">Open</button>
				<button onclick="goBack()">Back</button>
				<button onclick="reload()">Reload</button>
				<button onclick="toggleFullscreen()">Fullscreen</button>
				<button onclick="saveBookmark()">⭐</button>

				<iframe id="viewer"></iframe>

				<h3>Bookmarks</h3>
				<div id="bookmarks"></div>
				<button onclick="clearBookmarks()">Clear</button>
			</div>

			<!-- FUN -->
			<div id="fun" class="panel">
				<button onclick="randomColor()">Random BG</button>
				<button onclick="alert('🔥 Inferno Activated')">Alert</button>
				<button onclick="toggleTheme()">Light/Dark</button>
				<h3 id="clock"></h3>
			</div>

			<!-- SETTINGS -->
			<div id="settings" class="panel">
				<h2 class="glow">Settings</h2>
				<input type="color" onchange="changeTheme(this.value)">
</div>

			</div>
		</div>

		<script>
			let historyStack = [];

// Panels
function show(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// Open site
function openSite(){
  let url = document.getElementById("urlBox").value;
  if(!url.startsWith("http")) url = "https://" + url;

  historyStack.push(url);

  document.getElementById("viewer").src = url;
  fakeLoad();
}

// Back
function goBack(){
  historyStack.pop();
  let last = historyStack[historyStack.length - 1];
  if(last) document.getElementById("viewer").src = last;
}

// Reload
function reload(){
  document.getElementById("viewer").src += "";
}

// Fullscreen
function toggleFullscreen(){
  let iframe = document.getElementById("viewer");
  iframe.classList.add("fullscreen");
  document.getElementById("exitBtn").style.display = "block";
}

function exitFullscreen(){
  let iframe = document.getElementById("viewer");
  iframe.classList.remove("fullscreen");
  document.getElementById("exitBtn").style.display = "none";
}

// Loading bar
function fakeLoad(){
  let bar = document.getElementById("loading");
  bar.style.width = "0%";
  let i = 0;
  let interval = setInterval(()=>{
    i += 10;
    bar.style.width = i + "%";
    if(i >= 100) clearInterval(interval);
  },100);
}

// Clock
setInterval(()=>{
  document.getElementById("clock").innerText = new Date().toLocaleTimeString();
},1000);

// Random BG
function randomColor(){
  document.body.style.background =
    "rgb(" + Math.random()*255 + "," + Math.random()*255 + "," + Math.random()*255 + ")";
}

// Theme
function changeTheme(color){
  document.querySelectorAll('.glow').forEach(el=>{
    el.style.color = color;
    el.style.textShadow = `0 0 10px ${color}`;
  });
}

// Light/Dark
function toggleTheme(){
  document.body.style.background =
    document.body.style.background === "white" ? "black" : "white";
}

// Bookmarks
function saveBookmark(){
  let url = document.getElementById("urlBox").value;
  let list = JSON.parse(localStorage.getItem("bm") || "[]");
  list.push(url);
  localStorage.setItem("bm", JSON.stringify(list));
  loadBookmarks();
}

function loadBookmarks(){
  let list = JSON.parse(localStorage.getItem("bm") || "[]");
  let div = document.getElementById("bookmarks");
  div.innerHTML = "";
  list.forEach(u=>{
    let el = document.createElement("div");
    el.innerText = u;
    el.className = "bookmark";
    el.onclick = ()=> {
      document.getElementById("urlBox").value = u;
    };
    div.appendChild(el);
  });
}

function clearBookmarks(){
  localStorage.removeItem("bm");
  loadBookmarks();
}

loadBookmarks();
		</script>

</body>

</html></body><html>
